services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=oms
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server: 
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://admin:password@postgres:5432/oms?sslmode=disable
      - JWT_SECRET=da03da35704e1d0cc80d97400d50ca5ffab4c93ed92ebd1569dd41b6e9f79478
      - PORT=:8080
      - CORS_ORIGIN=http://localhost
    depends_on:
      - postgres
  client: 
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:8080
    ports:
      - "80:80"
    depends_on: 
      - server
volumes:
  postgres_data:
